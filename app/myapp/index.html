<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 3rem; color: #00d4ff; margin-bottom: 20px; }
        p { font-size: 1.2rem; color: #aaa; margin-bottom: 10px; }
        .badge {
            display: inline-block;
            background: #00d4ff22;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 20px;
            border-radius: 20px;
            margin: 5px;
            font-size: 0.9rem;
        }
        .status {
            margin-top: 30px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 10px;
            border-left: 4px solid #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 DevOps Project</h1>
        <p>Deployed with modern DevOps tools</p>
        <br>
        <span class="badge">Kubernetes</span>
        <span class="badge">ArgoCD</span>
        <span class="badge">GitLab CI/CD</span>
        <span class="badge">Terraform</span>
        <span class="badge">Docker</span>
        <div class="status">
            ✅ App is Running on Kubernetes!
        </div>
    </div>
</body>
</html>
