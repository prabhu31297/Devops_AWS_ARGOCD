# ──────────────────────────────────────────────────────────────────────────────
# GitLab CI/CD Pipeline — GitOps on AWS
#
# Stages:
#   1. test    — run unit tests
#   2. build   — build Docker image and push to ECR
#   3. deploy  — update the k8s/deployment.yaml image tag (GitOps push)
#
# Required GitLab CI/CD variables (set in Settings → CI/CD → Variables):
#   AWS_ACCOUNT_ID       — your 12-digit AWS account ID
#   AWS_REGION           — AWS region (e.g. us-east-1)
#   AWS_ACCESS_KEY_ID    — IAM access key with ECR push permissions
#   AWS_SECRET_ACCESS_KEY — corresponding secret key
#   ECR_REPO_NAME        — ECR repository name (e.g. gitops-app)
#   GIT_DEPLOY_TOKEN     — GitLab project access token with read/write repo scope
#                          (used to push the updated deployment manifest)
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  FULL_IMAGE: "${ECR_REGISTRY}/${ECR_REPO_NAME}:${IMAGE_TAG}"

# ── Test stage ────────────────────────────────────────────────────────────────

unit-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir -r app/requirements.txt -r app/requirements-dev.txt
  script:
    - cd app
    - python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: app/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Build & Push stage ────────────────────────────────────────────────────────

build-push:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region "$AWS_REGION" |
        docker login --username AWS --password-stdin "$ECR_REGISTRY"
  script:
    - docker build
        --label "git-commit=$CI_COMMIT_SHA"
        --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        -t "$FULL_IMAGE"
        -t "${ECR_REGISTRY}/${ECR_REPO_NAME}:latest"
        app/
    - docker push "$FULL_IMAGE"
    - docker push "${ECR_REGISTRY}/${ECR_REPO_NAME}:latest"
    - echo "IMAGE_TAG=${IMAGE_TAG}" > build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Deploy stage (GitOps image tag update) ───────────────────────────────────

update-k8s-manifest:
  stage: deploy
  image: alpine/git:latest
  needs:
    - job: build-push
      artifacts: true
  before_script:
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "GitLab CI Bot"
  script:
    # Clone via deploy token so we can push
    - git clone
        "https://gitlab-ci-token:${GIT_DEPLOY_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        /tmp/repo
    - cd /tmp/repo

    # Replace the image placeholder/tag in the deployment manifest
    - |
      sed -i \
        "s|image: .*/${ECR_REPO_NAME}:.*|image: ${FULL_IMAGE}|g" \
        k8s/deployment.yaml

    # Update the app.kubernetes.io/version label to match the image tag
    - |
      sed -i \
        "s|app.kubernetes.io/version: .*|app.kubernetes.io/version: \"${IMAGE_TAG}\"|g" \
        k8s/deployment.yaml

    # Commit and push the updated manifest
    - git add k8s/deployment.yaml
    - git commit -m "ci: update image tag to ${IMAGE_TAG} [skip ci]"
    - git push origin "${CI_DEFAULT_BRANCH}"
  environment:
    name: production
    url: "https://gitops-app.example.com"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
